name: Build & Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────────
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: augustus/package-lock.json

      - name: Install dependencies
        working-directory: augustus
        run: npm ci

      - name: Typecheck API
        working-directory: augustus
        run: npm run typecheck -w packages/api

      - name: Typecheck Business Dashboard
        working-directory: augustus
        run: npm run typecheck -w packages/business-dashboard

      - name: Typecheck Admin Dashboard
        working-directory: augustus
        run: npm run typecheck -w packages/admin-dashboard

      - name: Build all packages
        working-directory: augustus
        env:
          NODE_ENV: production
          VITE_API_URL: ''
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            augustus/packages/api/dist/
            augustus/packages/business-dashboard/dist/
            augustus/packages/admin-dashboard/dist/
          retention-days: 1

  # ── Job 2: Deploy to Hostinger via SSH ───────────────────────────────────────
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='packages/api/.env' \
            --exclude='packages/*/src' \
            --exclude='packages/*/node_modules' \
            augustus/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_APP_PATH }}/

      - name: Install production dependencies on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd ${{ secrets.HOSTINGER_APP_PATH }}
            npm ci --omit=dev
            echo "Dependencies installed"

      - name: Write production .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cat > ${{ secrets.HOSTINGER_APP_PATH }}/packages/api/.env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSL=true
            DB_POOL_MAX=10
            REDIS_URL=${{ secrets.REDIS_URL }}
            S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
            S3_REGION=${{ secrets.S3_REGION }}
            S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
            CLAUDE_MODEL=claude-haiku-20240307
            META_APP_ID=${{ secrets.META_APP_ID }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            META_WEBHOOK_VERIFY_TOKEN=${{ secrets.META_WEBHOOK_VERIFY_TOKEN }}
            META_GRAPH_API_VERSION=v19.0
            META_EMBEDDED_SIGNUP_CONFIG_ID=${{ secrets.META_EMBEDDED_SIGNUP_CONFIG_ID }}
            PAYNOW_INTEGRATION_ID=${{ secrets.PAYNOW_INTEGRATION_ID }}
            PAYNOW_INTEGRATION_KEY=${{ secrets.PAYNOW_INTEGRATION_KEY }}
            PAYNOW_RETURN_URL=https://augustus.silverconne.com/payment/return
            PAYNOW_RESULT_URL=https://augustus.silverconne.com/payments/paynow/webhook
            EMAIL_PROVIDER=sendgrid
            EMAIL_API_KEY=${{ secrets.EMAIL_API_KEY }}
            EMAIL_FROM_ADDRESS=${{ secrets.EMAIL_FROM_ADDRESS }}
            EMAIL_FROM_NAME=Augustus
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=24h
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            CORS_ORIGINS=https://augustus.silverconne.com
            BASE_URL=https://augustus.silverconne.com
            FRONTEND_URL=https://augustus.silverconne.com
            WITHDRAWAL_AUTO_PROCESS_THRESHOLD=50
            ENVEOF
            echo ".env written"

      - name: Restart Node.js app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            # Hostinger uses PM2 or their own process manager
            # Try PM2 first, fall back to Hostinger's restart command
            if command -v pm2 &> /dev/null; then
              pm2 restart augustus || pm2 start ${{ secrets.HOSTINGER_APP_PATH }}/packages/api/dist/index.js --name augustus
            else
              # Hostinger Cloud Node.js apps can be restarted via their CLI
              cd ${{ secrets.HOSTINGER_APP_PATH }}
              touch tmp/restart.txt 2>/dev/null || true
            fi
            echo "App restarted"

      - name: Health check
        run: |
          sleep 10
          curl -f https://augustus.silverconne.com/health || exit 1
          echo "Health check passed"
