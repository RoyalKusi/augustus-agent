name: CI — Typecheck & Build

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: augustus/package-lock.json

      - name: Install dependencies
        working-directory: augustus
        run: npm ci

      - name: Typecheck all packages
        working-directory: augustus
        run: npm run typecheck

      - name: Build all packages
        working-directory: augustus
        env:
          NODE_ENV: production
          VITE_API_URL: ''
        run: npm run build

      - name: Build success
        run: echo "All packages built successfully"
